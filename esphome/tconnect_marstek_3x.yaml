substitutions:
  name: marstek-3x
  friendly_name: Marstek 3x

esphome:
  name: ${name}
  min_version: 2025.11.0
  name_add_mac_suffix: false

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  logs:
    component: ERROR

api:
  reboot_timeout: 0s

ota:
  - platform: esphome
  - platform: web_server

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 0s
  fast_connect: true
  power_save_mode: high
  min_auth_mode: wpa2
  ap:
    ssid: "${friendly_name} Hotspot"
    password: "configesp"
    ap_timeout: 15s

captive_portal:
  id: id_captive_portal

web_server:
  port: 80
  version: 3
  include_internal: false
  local: true
  sorting_groups:
    - id: Info
      name: "Info"
      sorting_weight: -40
    - id: Control
      name: "Control"
      sorting_weight: -30
    - id: Status
      name: "Status"
      sorting_weight: -20
    - id: Diagnostic
      name: "Diagnostic"
      sorting_weight: -10

uart:
  - id: uart_m1
    tx_pin: GPIO4
    rx_pin: GPIO5
    baud_rate: 115200
    data_bits: 8
    stop_bits: 1
    parity: NONE
  - id: uart_m2
    tx_pin: GPIO6
    rx_pin: GPIO7
    baud_rate: 115200
    data_bits: 8
    stop_bits: 1
    parity: NONE
  - id: uart_m3
    tx_pin: GPIO17
    rx_pin: GPIO18
    baud_rate: 115200
    data_bits: 8
    stop_bits: 1
    parity: NONE

modbus:
  - id: modbus_m1
    uart_id: uart_m1
    send_wait_time: 15ms
  - id: modbus_m2
    uart_id: uart_m2
    send_wait_time: 15ms
  - id: modbus_m3
    uart_id: uart_m3
    send_wait_time: 15ms

modbus_controller:
  - id: mt_m1
    address: 0x1
    modbus_id: modbus_m1
    command_throttle: 15ms
    update_interval: 1s
  - id: mt_m2
    address: 0x1
    modbus_id: modbus_m2
    command_throttle: 15ms
    update_interval: 1s
  - id: mt_m3
    address: 0x1
    modbus_id: modbus_m3
    command_throttle: 15ms
    update_interval: 1s

debug:
  update_interval: 10s

switch:
  - platform: template
    name: UART Logging
    id: uart_debug_switch
    icon: mdi:text
    restore_mode: ALWAYS_OFF
    optimistic: true
    turn_on_action:
      - logger.set_level: VERBOSE
    turn_off_action:
      - logger.set_level: ERROR
    entity_category: diagnostic
    web_server:
      sorting_group_id: Diagnostic
      sorting_weight: 20

text_sensor:
  - platform: debug
    reset_reason:
      name: "Reset Reason"
      entity_category: diagnostic

  - platform: wifi_info
    ip_address:
      name: ESP IP
      icon: mdi:ip
      web_server:
        sorting_group_id: Diagnostic
        sorting_weight: 4
    ssid:
      name: ESP SSID
      icon: mdi:wifi
      web_server:
        sorting_group_id: Diagnostic
        sorting_weight: 3

  - platform: version
    name: ESP Version
    hide_timestamp: true
    disabled_by_default: false
    icon: mdi:new-box
    entity_category: diagnostic
    web_server:
      sorting_group_id: Diagnostic
      sorting_weight: 2

sensor:
  - platform: wifi_signal
    name: ESP WiFi Signal Strength
    icon: mdi:wifi
    id: wifi_strength
    update_interval: 30s
    entity_category: diagnostic
    web_server:
      sorting_group_id: Diagnostic
      sorting_weight: 6

  - platform: copy
    source_id: wifi_strength
    name: ESP Wifi signal
    id: wifi_signal_proc
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    entity_category: diagnostic
    device_class: ""
    icon: mdi:wifi
    web_server:
      sorting_group_id: Diagnostic
      sorting_weight: 5

packages:
  # M1 (Marstek Venus V3)
  marstek_m1: !include
    file: marstek_battery_block.yaml
    vars:
      batt_prefix: m1
      batt_label: "M1"
      batt_ctrl: mt_m1
      batt_bms_version_addr: 30204
      batt_battery_voltage_addr: 30100
      batt_battery_current_addr: 30101
      batt_battery_current_multiplier: 0.1
      batt_battery_power_addr: 30001
      batt_battery_power_value_type: S_WORD
      batt_ac_frequency_multiplier: 0.1
      batt_ac_current_multiplier: 0.01
      batt_cell_temp_multiplier: 0.1
  marstek_m1_v3_cells: !include
    file: marstek_v3_cells.yaml
    vars:
      batt_prefix: m1
      batt_label: "M1"
      batt_ctrl: mt_m1

  # M2 (Marstek Venus V2)
  marstek_m2: !include
    file: marstek_battery_block.yaml
    vars:
      batt_prefix: m2
      batt_label: "M2"
      batt_ctrl: mt_m2
      batt_bms_version_addr: 31102
      batt_battery_voltage_addr: 32100
      batt_battery_current_addr: 32101
      batt_battery_current_multiplier: 0.01
      batt_battery_power_addr: 32102
      batt_battery_power_value_type: S_DWORD
      batt_ac_frequency_multiplier: 0.01
      batt_ac_current_multiplier: 0.01
      batt_cell_temp_multiplier: 1.0

  marstek_m2_extras: !include
    file: marstek_v141_extras.yaml
    vars:
      batt_prefix: m2
      batt_label: "M2"
      batt_ctrl: mt_m2

  # M3 (Marstek Venus V2)
  marstek_m3: !include
    file: marstek_battery_block.yaml
    vars:
      batt_prefix: m3
      batt_label: "M3"
      batt_ctrl: mt_m3
      batt_bms_version_addr: 31102
      batt_battery_voltage_addr: 32100
      batt_battery_current_addr: 32101
      batt_battery_current_multiplier: 0.01
      batt_battery_power_addr: 32102
      batt_battery_power_value_type: S_DWORD
      batt_ac_frequency_multiplier: 0.01
      batt_ac_current_multiplier: 0.01
      batt_cell_temp_multiplier: 1.0

  marstek_m3_extras: !include
    file: marstek_v141_extras.yaml
    vars:
      batt_prefix: m3
      batt_label: "M3"
      batt_ctrl: mt_m3

 # ── EnergyOS bouwstenen ──
  eos_supervisor:      !include eos_supervisor.yaml
  eos_battery_driver:  !include eos_battery_driver.yaml
  eos_strategies:      !include eos_strategies.yaml
  eos_homewizard:      !include eos_homewizard.yaml